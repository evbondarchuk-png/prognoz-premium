<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Прогноз · Премиум</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="importmap">
  { "imports": { "https://www.gstatic.com/firebasejs/10.7.0/": "/libs/firebase/10.7.0/" } }
  </script>
  <link rel="stylesheet" href="tokens.css">
  <style>
    /* ============ КАРКАС ============ */
    .wrap{max-width:1024px;margin:0 auto;padding-bottom:80px}
    @media(max-width:640px){.wrap{padding-bottom:100px}}

    /* HERO — тёмная петроловая шапка */
    .top{background:linear-gradient(160deg,var(--petrol),var(--petrol-deep));color:#fff;padding:20px 20px 22px;position:sticky;top:0;z-index:10}
    .top-inner{max-width:1024px;margin:0 auto;display:flex;align-items:center;gap:14px}
    .avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
    .who{flex:1;min-width:0}
    .who .role{display:inline-block;background:rgba(255,255,255,.16);border-radius:6px;padding:2px 8px;font-weight:700;font-size:10px;margin-right:6px;letter-spacing:.03em;text-transform:uppercase}
    .who h1{font-size:17px;font-weight:800;line-height:1.2;margin:6px 0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .who .meta{font-size:11px;color:rgba(255,255,255,.72);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .top-actions{display:flex;gap:6px;flex-shrink:0}
    .top-btn{background:rgba(255,255,255,.12);border:none;color:#fff;font-family:inherit;font-size:14px;padding:8px;border-radius:10px;cursor:pointer;line-height:1;min-width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center}
    .top-btn:hover{background:rgba(255,255,255,.22)}

    /* Табы */
    .tabs{max-width:1024px;margin:0 auto;padding:0 12px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:88px;z-index:9}
    @media(max-width:640px){.tabs{top:86px}}
    .tab{flex:0 0 auto;padding:14px 16px;font-size:13px;font-weight:700;color:var(--muted);border:none;background:transparent;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:.12s}
    .tab:hover{color:var(--ink)}
    .tab.on{color:var(--petrol);border-bottom-color:var(--petrol)}
    .tab .em{font-size:15px;margin-right:5px}

    /* КАРТОЧКИ */
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin:12px;padding:16px}
    @media(min-width:900px){.card{margin:16px}}
    .card-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .eyebrow{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
    .card-h .eyebrow{flex:1}
    .big{font-size:32px;font-weight:800;letter-spacing:-.5px;line-height:1.05}
    .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:800;padding:4px 11px;border-radius:999px}
    .pill.ok{background:var(--ok-soft);color:var(--ok)}
    .pill.warn{background:var(--warn-soft);color:var(--warn)}
    .pill.bad{background:var(--bad-soft);color:var(--bad)}
    .row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
    .muted{color:var(--muted);font-size:12px}
    .stack{height:32px;background:var(--card-2);border:1px solid var(--line);border-radius:10px;overflow:hidden;display:flex;position:relative;margin-top:10px}
    .stack .fact{background:var(--petrol);display:flex;align-items:center;padding:0 10px;color:#fff;font-weight:800;font-size:12px}

    /* Компонентные полосы */
    .comp-row{display:grid;grid-template-columns:70px 1fr auto;gap:10px;align-items:center;margin-top:10px;font-size:12px}
    .comp-row .cn{color:var(--ink-2);font-weight:600}
    .comp-row .cv{font-weight:800;white-space:nowrap;color:var(--ink);min-width:36px;text-align:right}
    .stripe{height:6px;border-radius:3px;background:var(--card-2);overflow:hidden}
    .stripe>i{display:block;height:100%;border-radius:3px;background:var(--petrol);transition:width .3s ease}

    /* Grid для главной */
    .grid-2{display:grid;grid-template-columns:1fr;gap:0}
    @media(min-width:768px){.grid-2{grid-template-columns:1fr 1fr;gap:0;margin:0}}

    /* Баннер */
    .banner{background:var(--warn-soft);border:1px solid var(--warn-line,#F0D5AA);color:var(--warn);border-radius:12px;padding:12px 14px;margin:12px;font-size:12.5px;line-height:1.45}
    .banner b{color:var(--ink)}

    /* Loader / пусто */
    .loader{padding:40px;text-align:center;color:var(--muted)}
    .empty-tab{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}
    .empty-tab .em{font-size:32px;margin-bottom:10px;display:block}

    /* Экран (одна вкладка активна) */
    .screen{display:none}
    .screen.on{display:block}

    /* Прогноз (вал/доход) карточки */
    .money-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    @media(max-width:520px){.money-grid{grid-template-columns:1fr}}
    .money-cell{background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:14px 15px}
    .money-cell.gold{background:var(--gold-soft);border-color:var(--gold-line)}
    .money-cell .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:6px}
    .money-cell .val{font-size:22px;font-weight:800;color:var(--ink)}
    .money-cell.gold .val{color:var(--gold)}
    .money-cell .sub{font-size:11.5px;color:var(--muted);margin-top:4px}

    /* Стрик badge */
    .streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);color:var(--gold);border:1px solid var(--gold-line);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;margin-left:8px}
    .n-risk-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bad-soft);color:var(--bad);border:1px solid var(--bad-line);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;margin-left:8px}
  </style>
</head>
<body>
<div id="hero"></div>
<div id="tabs" class="tabs" style="display:none">
  <button class="tab on" data-tab="main"><span class="em">🏠</span>Главная</button>
  <button class="tab" data-tab="prognoz"><span class="em">📈</span>Прогноз</button>
  <button class="tab" data-tab="coach"><span class="em">🎓</span>Тренер</button>
  <button class="tab" data-tab="clients"><span class="em">👥</span>Клиенты</button>
  <button class="tab" data-tab="tasks"><span class="em">📋</span>Задачи<span id="tabBadge"></span></button>
</div>
<div class="wrap">
  <div id="banner"></div>
  <div id="screen-main" class="screen on"><div class="loader">Загрузка кабинета…</div></div>
  <div id="screen-prognoz" class="screen"></div>
  <div id="screen-coach" class="screen"></div>
  <div id="screen-clients" class="screen"></div>
  <div id="screen-tasks" class="screen"></div>
</div>

<script type="module">
import { requireAuth, logout } from './auth-guard.js';
import { getApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-functions.js';

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials = (name) => (String(name||'').trim().split(/\s+/).map(p=>p[0]||'').slice(0,2).join('') || '?').toUpperCase();
const fmtK = (n) => { n = Number(n)||0; if(n>=1e6) return (n/1e6).toFixed(1).replace('.',',')+' млн'; if(n>=1e4) return Math.round(n/1e3)+'к'; if(n>=1e3) return (n/1e3).toFixed(1).replace('.',',')+'к'; return String(Math.round(n)); };
const fmtFull = (n) => String(Math.round(Number(n)||0)).replace(/\B(?=(\d{3})+(?!\d))/g,' ');

const CTX = { data: null, target: null };
window.__ctx = CTX;

(async () => {
  const me = await requireAuth();
  const params = new URLSearchParams(location.search);
  const targetCode = params.get('agent') || me.code;
  CTX.target = targetCode;

  const fns = getFunctions(getApp(), 'europe-west1');
  let d;
  try {
    const res = await httpsCallable(fns, 'getDashboard')({ user_code: targetCode, view: 'partner' });
    d = res.data;
    CTX.data = d;
  } catch (e) {
    document.getElementById('screen-main').innerHTML =
      `<div class="banner">Не удалось загрузить кабинет: <b>${esc(e.message || String(e))}</b></div>`;
    console.error(e);
    return;
  }

  renderHero(d);
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('banner').innerHTML = `<div class="banner">🚧 <b>Премиум v2 · этап 1 фаза 1.</b> Дальше будем добавлять прогноз, тренера, задачи. Данные — из общего бэка.</div>`;
  renderMain(d);

  // Табы
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x === t));
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
      const target = t.dataset.tab;
      document.getElementById('screen-' + target).classList.add('on');
      renderTab(target, d);
      // scroll to top
      window.scrollTo({top: 0, behavior: 'smooth'});
    };
  });
})();

function renderHero(d) {
  const u = d.user || {};
  const roleLabel = u.role_label || 'Партнёр';
  const meta = [];
  if (u.mop_name && u.code !== u.mop_code) meta.push('Старший: ' + u.mop_name);
  if (u.stazh_label) meta.push('стаж ' + u.stazh_label);
  const showBack = new URLSearchParams(location.search).has('agent');

  // Позитивный или негативный стрик
  const nr = d.n_risk || {};
  let streakChip = '';
  if ((nr.good_streak || 0) >= 1) {
    const g = nr.good_streak;
    streakChip = `<span class="streak-badge">🔥 ${g} ${g === 1 ? 'неделя' : g < 5 ? 'недели' : 'недель'} в плане</span>`;
  } else if ((nr.streak || 0) >= 1) {
    const s = Math.min(nr.streak, 4);
    streakChip = `<span class="n-risk-badge">Н${s}</span>`;
  }

  document.getElementById('hero').innerHTML = `
    <div class="top">
      <div class="top-inner">
        <div class="avatar">${esc(initials(u.name))}</div>
        <div class="who">
          <span class="role">${esc(roleLabel)}</span>${streakChip}
          <h1>${esc(u.name || '')}</h1>
          <div class="meta">${esc(meta.join(' · '))}</div>
        </div>
        <div class="top-actions">
          ${showBack ? '<button class="top-btn" onclick="history.back()" title="Назад">←</button>' : ''}
          <button class="top-btn" onclick="__logout()" title="Выход">⎋</button>
        </div>
      </div>
    </div>`;
}

function renderTab(name, d) {
  if (name === 'main') { if (!document.querySelector('#screen-main .card')) renderMain(d); return; }
  if (name === 'prognoz') { renderPrognozTab(d); return; }
  if (name === 'coach') { renderCoachTab(d); return; }
  if (name === 'clients') { renderClientsTab(d); return; }
  if (name === 'tasks') { renderTasksTab(d); return; }
}

function renderMain(d) {
  const html = [
    irCard(d),
    moneyCard(d),
    goalCard(d),
    svetoforCard(d),
  ].filter(Boolean).join('');
  document.getElementById('screen-main').innerHTML = html || '<div class="empty-tab">Данных нет</div>';
}

function irCard(d) {
  const ir = d.ir_v2 && d.ir_v2.week;
  if (!ir) return '';
  const tot = ir.ir_total ?? 0;
  const cls = tot >= 70 ? 'ok' : (tot >= 50 ? 'warn' : 'bad');
  const b = ir.breakdown || {};
  const c = (key, label) => {
    const v = (b[key] && (b[key].total ?? b[key])) ?? 0;
    const pct = Math.min(100, Math.max(0, v));
    return `<div class="comp-row">
      <div class="cn">${esc(label)}</div>
      <div class="stripe"><i style="width:${pct}%"></i></div>
      <div class="cv">${v}%</div>
    </div>`;
  };
  return `<div class="card">
    <div class="card-h">
      <span class="eyebrow">Индекс развития · неделя</span>
      <span class="pill ${cls}">${cls === 'ok' ? 'норма' : cls === 'warn' ? 'внимание' : 'риск'}</span>
    </div>
    <div class="big">${tot}%</div>
    <div class="muted" style="margin-top:4px">4 равные части: поток · горячие · задатки · вал</div>
    ${c('c1','поток')}${c('c2','горячие')}${c('c3','задатки')}${c('c4','вал')}
  </div>`;
}

function moneyCard(d) {
  const fc = d.forecast;
  if (!fc || !fc.current_month) return '';
  const cm = fc.current_month;
  const nm = fc.next_month || {};
  const factRev = cm.fact_revenue || 0;
  const fcstRev = cm.forecast_revenue || 0;
  const totalRev = cm.revenue_total || (factRev + fcstRev);
  const factInc = cm.fact_income || 0;
  return `<div class="card">
    <div class="eyebrow">${esc((cm.label||'этот месяц').toUpperCase())} · вал и доход</div>
    <div class="money-grid">
      <div class="money-cell">
        <div class="lbl">Вал · оборот</div>
        <div class="val num">${fmtK(factRev)} ₽</div>
        ${fcstRev > 0 ? `<div class="sub">+ прогноз ${fmtK(fcstRev)} → итого ${fmtK(totalRev)}</div>` : '<div class="sub">факт закрытых сделок</div>'}
      </div>
      <div class="money-cell gold">
        <div class="lbl">Доход · моя ЗП</div>
        <div class="val num">${fmtK(factInc)} ₽</div>
        <div class="sub">≈ 48% от вала</div>
      </div>
    </div>
    ${nm.revenue > 0 ? `<div class="money-grid" style="margin-top:8px">
      <div class="money-cell">
        <div class="lbl">${esc((nm.label||'след').toUpperCase())} · прогноз вала</div>
        <div class="val num">${fmtK(nm.revenue)} ₽</div>
        ${nm.target_revenue > 0 ? `<div class="sub">план ${fmtK(nm.target_revenue)} · ${nm.progress_pct}%</div>` : ''}
      </div>
      <div class="money-cell gold">
        <div class="lbl">Прогноз дохода</div>
        <div class="val num">${fmtK(nm.income)} ₽</div>
        <div class="sub">≈ 48% от прогнозного вала</div>
      </div>
    </div>` : ''}
  </div>`;
}

function goalCard(d) {
  const g = d.goal;
  const u = d.user || {};
  if (!g) return '';
  const inc = u.income_month || 0;
  const tgt = g.target_revenue_month || 0;
  const pct = tgt > 0 ? Math.min(100, Math.round(inc/tgt*100)) : 0;
  return `<div class="card">
    <div class="eyebrow">Цель по доходу</div>
    <div class="row" style="justify-content:space-between;margin-top:8px">
      <div class="big" style="color:var(--gold)">${fmtK(inc)} <span class="muted num" style="font-size:14px;font-weight:600">/ ${fmtK(tgt)} ₽</span></div>
      <span class="pill ${pct >= 90 ? 'ok' : pct >= 60 ? 'warn' : 'bad'}">${pct}%</span>
    </div>
    <div class="stack"><div class="fact" style="width:${pct}%">${pct >= 30 ? fmtK(inc) : ''}</div></div>
    <div class="muted" style="margin-top:8px">Средний доход за 12 мес vs цель${g.is_auto ? ' · авто (доход + 50к)' : ''}</div>
  </div>`;
}

function svetoforCard(d) {
  const u = d.user || {};
  const pos = u.position_in_pool ?? u.position_in_company;
  if (pos == null) return '';
  const zone = u.svetofor_zone_label || '';
  const category = u.svetofor_zone_category || '';
  return `<div class="card">
    <div class="eyebrow">Светофор</div>
    <div class="row" style="justify-content:space-between;align-items:center;margin-top:8px">
      <div class="big">#${pos}</div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700">${esc(zone)}</div>
        <div class="muted">${esc(category)}</div>
      </div>
    </div>
  </div>`;
}

// ── Заглушки других табов ──
function renderPrognozTab(d) {
  document.getElementById('screen-prognoz').innerHTML = `<div class="empty-tab"><span class="em">📈</span>Вкладка «Прогноз» — в следующей фазе.</div>`;
}
function renderCoachTab(d) {
  document.getElementById('screen-coach').innerHTML = `<div class="empty-tab"><span class="em">🎓</span>Вкладка «Тренер» — в следующей фазе.</div>`;
}
function renderClientsTab(d) {
  document.getElementById('screen-clients').innerHTML = `
    <div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:44px;margin-bottom:16px">✨</div>
      <div style="font-size:11px;font-weight:800;color:var(--gold);background:var(--gold-soft);display:inline-block;padding:6px 12px;border-radius:999px;margin-bottom:14px">Coming Soon · 01.09.2026</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:10px">👥 База клиентов</div>
      <div class="muted" style="max-width:400px;margin:0 auto">Полный список клиентов с историей, статусами и подсказками ИИ. Подтянем из CRM «Этажей».</div>
    </div>`;
}
function renderTasksTab(d) {
  document.getElementById('screen-tasks').innerHTML = `<div class="empty-tab"><span class="em">📋</span>Вкладка «Задачи» — в следующей фазе.</div>`;
}

window.__logout = async () => { await logout(); };
</script>
</body>
</html>
