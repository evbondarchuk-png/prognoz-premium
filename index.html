  <style>
    /* ============ КАРКАС ============ */
    .wrap{max-width:1024px;margin:0 auto;padding-bottom:var(--sp-8)}
    @media(max-width:640px){.wrap{padding-bottom:100px}}

    /* HERO — тёмная петроловая шапка */
    .top{background:linear-gradient(160deg,var(--petrol),var(--petrol-deep));color:#fff;padding:var(--sp-5) var(--sp-5) 22px;position:sticky;top:0;z-index:10;box-shadow:0 4px 20px rgba(7,59,67,.15)}

    .who .role{display:inline-block;background:rgba(255,255,255,.16);border-radius:var(--r-xs);padding:2px var(--sp-2);font-weight:var(--fw-b);font-size:var(--fs-xs);margin-right:var(--sp-1);letter-spacing:.03em;text-transform:uppercase;backdrop-filter:blur(4px)}

    .top-actions{display:flex;gap:var(--sp-1);flex-shrink:0}
    .top-btn{background:rgba(255,255,255,.12);border:none;color:#fff;font-family:inherit;font-size:var(--fs-base);padding:var(--sp-2);border-radius:var(--r-sm);cursor:pointer;line-height:1;min-width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;transition:background var(--transition)}
    .top-btn:hover{background:rgba(255,255,255,.22)}

    /* Табы */
    .tabs{max-width:1024px;margin:0 auto;padding:0 var(--sp-3);display:flex;gap:var(--sp-1);overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:88px;z-index:9}
    @media(max-width:640px){.tabs{top:86px}}
    .tab{flex:0 0 auto;padding:var(--sp-4) var(--sp-4);font-size:var(--fs-sm);font-weight:var(--fw-b);color:var(--muted);border:none;background:transparent;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;transition:color var(--transition),border-color var(--transition)}
    .tab:hover{color:var(--ink)}
    .tab.on{color:var(--petrol);border-bottom-color:var(--petrol)}
    .tab .em{font-size:15px;margin-right:5px}

    /* КАРТОЧКИ */
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);margin:var(--sp-3);padding:var(--sp-4);transition:box-shadow var(--transition)}
    @media(min-width:900px){.card{margin:var(--sp-4)}}
    .card-h{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-3)}
    .eyebrow{font-size:var(--fs-xs);font-weight:var(--fw-eb);letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
    .card-h .eyebrow{flex:1}
    .big{font-size:var(--fs-2xl);font-weight:var(--fw-eb);letter-spacing:-.5px;line-height:1.05}
    .row{display:flex;align-items:baseline;gap:var(--sp-3);flex-wrap:wrap}
    .stack{height:32px;background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;display:flex;position:relative;margin-top:var(--sp-3)}
    .stack .fact{background:var(--petrol);display:flex;align-items:center;padding:0 var(--sp-3);color:#fff;font-weight:var(--fw-eb);font-size:var(--fs-sm)}

    /* Компонентные полосы */
    .comp-row{display:grid;grid-template-columns:70px 1fr auto;gap:var(--sp-3);align-items:center;margin-top:var(--sp-3);font-size:var(--fs-sm)}
    .comp-row .cn{color:var(--ink-2);font-weight:var(--fw-sb)}
    .comp-row .cv{font-weight:var(--fw-eb);white-space:nowrap;color:var(--ink);min-width:36px;text-align:right}

    /* Баннер */
    .banner{background:var(--warn-soft);border:1px solid var(--warn-line);color:var(--warn);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-3);margin:var(--sp-3);font-size:var(--fs-sm);line-height:1.45}
    .banner b{color:var(--ink)}

    /* Loader / пусто */
    .loader{padding:var(--sp-8);text-align:center;color:var(--muted)}
    .empty-tab{padding:60px var(--sp-5);text-align:center;color:var(--muted);font-size:var(--fs-base)}
    .empty-tab .em{font-size:var(--fs-2xl);margin-bottom:var(--sp-3);display:block}

    /* Экран */
    .screen{display:none}
    .screen.on{display:block}

    /* Прогноз (вал/доход) карточки */
    .money-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);margin-top:var(--sp-3)}
    @media(max-width:520px){.money-grid{grid-template-columns:1fr}}
    .money-cell{background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-4)}
    .money-cell.gold{background:var(--gold-soft);border-color:var(--gold-line)}
    .money-cell .lbl{font-size:var(--fs-xs);font-weight:var(--fw-eb);text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-bottom:var(--sp-1)}
    .money-cell .val{font-size:22px;font-weight:var(--fw-eb);color:var(--ink)}
    .money-cell.gold .val{color:var(--gold)}
    .money-cell .sub{font-size:var(--fs-sm);color:var(--muted);margin-top:var(--sp-1)}

    /* Стрик badge */
    .streak-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-soft);color:var(--gold);border:1px solid var(--gold-line);border-radius:var(--r-pill);padding:var(--sp-1) var(--sp-3);font-size:var(--fs-xs);font-weight:var(--fw-eb);margin-left:var(--sp-2)}
    .n-risk-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bad-soft);color:var(--bad);border:1px solid var(--bad-line);border-radius:var(--r-pill);padding:var(--sp-1) var(--sp-3);font-size:var(--fs-xs);font-weight:var(--fw-eb);margin-left:var(--sp-2)}

    /* Воронка (кабинет партнёра, вкладки прогноз/тренер) */
    .funnel-side{border:1px solid var(--line);border-radius:var(--r-md);padding:var(--sp-3) var(--sp-3);margin-top:var(--sp-3);background:var(--card)}
    .funnel-head{display:flex;align-items:center;gap:var(--sp-2);margin-bottom:var(--sp-2)}
    .funnel-dot{width:9px;height:9px;border-radius:50%}
    .funnel-dot.buyer{background:var(--petrol)}
    .funnel-dot.seller{background:var(--ok)}
    .funnel-title{font-weight:var(--fw-eb);font-size:var(--fs-sm)}
    .funnel-stage{display:grid;grid-template-columns:1fr auto;gap:var(--sp-1);padding:var(--sp-1) 0;border-top:1px solid var(--line-2)}
    .funnel-stage:first-of-type{border-top:none}
    .funnel-stage .st-name{font-size:var(--fs-sm);font-weight:var(--fw-sb);color:var(--ink-2)}
    .funnel-stage .st-fp{font-size:var(--fs-xs);font-weight:var(--fw-eb);text-align:right}
    .funnel-stage .st-fp .fact{color:var(--ok)}
    .funnel-stage .st-fp .plan{color:var(--muted);font-weight:var(--fw-m)}
    .funnel-stage .st-bar{grid-column:1/-1;height:6px;background:var(--card-2);border-radius:3px;overflow:hidden;position:relative;margin-top:var(--sp-1)}
    .funnel-stage .st-bar>i{display:block;height:100%;border-radius:3px}
    .st-bar .st-fill-fact{background:var(--ok);position:absolute;left:0;top:0}
    .st-bar .st-fill-forecast{background:var(--warn);position:absolute;top:0}

    /* Прогноз / цикл-график */
    .cycle-bars{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-2);align-items:end;height:180px;margin-top:var(--sp-3)}
    .cycle-col{display:flex;flex-direction:column;align-items:center;gap:5px;height:100%}
    .cycle-col .cur-tag{font-size:9px;color:var(--petrol);text-transform:uppercase;letter-spacing:.03em;font-weight:var(--fw-eb);min-height:12px}
    .cycle-col .cur-tag.hidden{opacity:0}
    .cycle-col .bar-slot{position:relative;flex:1;width:100%;background:var(--card-2);border-radius:var(--r-xs);overflow:hidden;min-height:100px}
    .cycle-col .plan-bar{position:absolute;bottom:0;left:0;right:0;background:repeating-linear-gradient(45deg,var(--line) 0,var(--line) 4px,var(--line-2) 4px,var(--line-2) 8px);border-radius:var(--r-xs);opacity:.7}
    .cycle-col .fact-bar{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,var(--ok),#15803d);border-radius:var(--r-xs);display:flex;align-items:flex-start;justify-content:center;padding-top:5px}
    .cycle-col .fcst-bar{position:absolute;left:0;right:0;background:linear-gradient(180deg,var(--petrol),var(--petrol-deep));border-radius:var(--r-xs);display:flex;align-items:flex-start;justify-content:center;padding-top:5px}
    .cycle-col .bar-lbl{color:#fff;font-size:var(--fs-xs);font-weight:var(--fw-eb);text-shadow:0 1px 2px rgba(0,0,0,.15)}
    .cycle-col .val-label{font-size:var(--fs-xs);font-weight:var(--fw-eb);color:var(--ink);text-align:center}
    .cycle-col .mon-label{font-size:var(--fs-xs);color:var(--muted);font-weight:var(--fw-b);text-transform:uppercase}
    .cycle-legend{display:flex;gap:var(--sp-3);font-size:var(--fs-xs);color:var(--muted);padding:var(--sp-3) 0 var(--sp-1);border-top:1px dashed var(--line);margin-top:var(--sp-2);flex-wrap:wrap}
    .cycle-legend i{display:inline-block;width:11px;height:11px;border-radius:2px;margin-right:5px;vertical-align:-1px}

    /* Coach */
    .weak-item{display:flex;justify-content:space-between;padding:var(--sp-2) 0;border-top:1px solid var(--line-2);font-size:var(--fs-sm)}
    .weak-item:first-of-type{border-top:none}
    .weak-item .wl{color:var(--bad);font-weight:var(--fw-sb)}
    .weak-item .wr{color:var(--muted)}

    /* Задачи (list-row) */
    .list-row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) var(--sp-3);border-bottom:1px solid var(--line-2);cursor:pointer;transition:background var(--transition)}
    .list-row:last-child{border-bottom:none}
    .list-row:hover{background:var(--card-2)}
    .list-row.overdue{background:var(--bad-soft)}
    .list-row.done{opacity:.55}
    .list-row.done .lr-title{text-decoration:line-through}
    .lr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .lr-body{flex:1;min-width:0}
    .lr-title{font-size:var(--fs-sm);font-weight:var(--fw-sb);color:var(--ink);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lr-meta{font-size:var(--fs-xs);color:var(--muted);margin-top:2px;display:flex;gap:var(--sp-2);flex-wrap:wrap}
    .lr-when{font-weight:var(--fw-sb)}
    .lr-when.overdue{color:var(--bad);font-weight:var(--fw-eb)}
    .lr-when.today{color:var(--bad);font-weight:var(--fw-eb)}
    .lr-when.week{color:var(--warn);font-weight:var(--fw-b)}
    .lr-actions{display:flex;gap:var(--sp-1);flex-shrink:0}
    .lr-actions button{width:30px;height:30px;border:none;background:var(--card-2);border-radius:var(--r-sm);cursor:pointer;font-size:var(--fs-sm);display:flex;align-items:center;justify-content:center;transition:background var(--transition)}
    .lr-actions button:hover{background:var(--line)}
    .lr-actions .lr-done{background:var(--ok-soft);color:var(--ok)}
    .lr-actions .lr-done:hover{background:var(--ok-line)}

    .task-filters{display:flex;gap:var(--sp-1);flex-wrap:wrap;padding:var(--sp-3);background:var(--card-2);border-radius:var(--r-md);margin-bottom:var(--sp-3)}
    .task-filters .lf-btn{font-size:var(--fs-xs);font-weight:var(--fw-b);padding:var(--sp-1) var(--sp-3);border:none;background:var(--card);color:var(--muted);border-radius:var(--r-pill);cursor:pointer;font-family:inherit;transition:color var(--transition),background var(--transition)}
    .task-filters .lf-btn:hover{color:var(--ink)}
    .task-filters .lf-btn.on{background:var(--petrol);color:#fff}

    /* Адаптивность hero */
    @media(max-width:480px){
      .top-inner{gap:var(--sp-2)}
      .who h1{font-size:var(--fs-base)}
      .top-btn{min-width:34px;height:34px;font-size:var(--fs-sm)}
    }
  </style>
</head>
<body>
<div id="hero"></div>
<div id="tabs" class="tabs" style="display:none">
  <button class="tab on" data-tab="main"><span class="em">🏠</span>Главная</button>
  <button class="tab" data-tab="prognoz"><span class="em">📈</span>Прогноз</button>
  <button class="tab" data-tab="coach"><span class="em">🎓</span>Тренер</button>
  <button class="tab" data-tab="clients"><span class="em">👥</span>Клиенты</button>
  <button class="tab" data-tab="tasks"><span class="em">📋</span>Задачи<span id="tabBadge"></span></button>
</div>
<div class="wrap">
  <div id="banner"></div>
  <div id="screen-main" class="screen on"><div class="loader">Загрузка кабинета…</div></div>
  <div id="screen-prognoz" class="screen"></div>
  <div id="screen-coach" class="screen"></div>
  <div id="screen-clients" class="screen"></div>
  <div id="screen-tasks" class="screen"></div>
</div>

<script type="module">
import { requireAuth, logout } from './auth-guard.js';
import { getApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-functions.js';
import { openTaskDetail } from './calendar.js';
import { getDatabase } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js';
import { initAssistant } from './assistant.js?v=7';

const esc = (s) => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initials = (name) => (String(name||'').trim().split(/\s+/).map(p=>p[0]||'').slice(0,2).join('') || '?').toUpperCase();
const fmtK = (n) => { n = Number(n)||0; if(n>=1e6) return (n/1e6).toFixed(1).replace('.',',')+' млн'; if(n>=1e4) return Math.round(n/1e3)+'к'; if(n>=1e3) return (n/1e3).toFixed(1).replace('.',',')+'к'; return String(Math.round(n)); };
const monShort = (ym) => { const m=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек']; return m[parseInt((ym||'').slice(5,7),10)-1] || ym; };

const CTX = { data: null, target: null, taskFilter: 'all' };
window.__ctx = CTX;

(async () => {
  const me = await requireAuth();
  const params = new URLSearchParams(location.search);
  const targetCode = params.get('agent') || me.code;
  CTX.target = targetCode;

  const fns = getFunctions(getApp(), 'europe-west1');
  let d;
  try {
    const res = await httpsCallable(fns, 'getDashboard')({ user_code: targetCode, view: 'partner' });
    d = res.data;
    CTX.data = d;
    // Yandex.Metrika — цель «Кабинет загружен» + параметры
    try { ym(110734803, 'reachGoal', 'cabinet_loaded'); } catch(_){}
    try { ym(110734803, 'userParams', { role: d.user?.role || 'realtor', code: targetCode }); } catch(_){}
  } catch (e) {
    document.getElementById('screen-main').innerHTML =
      `<div class="banner">Не удалось загрузить кабинет: <b>${esc(e.message || String(e))}</b></div>`;
    console.error(e);
    return;
  }

  renderHero(d);
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('banner').innerHTML = `<div class="banner">🚧 <b>Премиум v2 · этап 1.</b> Партнёрский кабинет на реальных данных общего бэка. Остальные роли и ассистент — на подходе.</div>`;
  renderMain(d);
  // Ассистент — плавающая кнопка + чат-шторка + бриф
  initAssistant(d);
  // Обновим бейджик задач
  const cntTasks = (d.tasks && d.tasks.counts) || {};
  const total = (cntTasks.today||0) + (cntTasks.expired||0);
  if (total > 0) document.getElementById('tabBadge').textContent = ' ' + total;

  // Табы
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.toggle('on', x === t));
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
      const target = t.dataset.tab;
      document.getElementById('screen-' + target).classList.add('on');
      renderTab(target, d);
      try { ym(110734803, 'params', { tab: target }); } catch(_){}
      window.scrollTo({top: 0, behavior: 'smooth'});
    };
  });
})();

function renderHero(d) {
  const u = d.user || {};
  const roleLabel = u.role_label || 'Партнёр';
  const meta = [];
  if (u.mop_name && u.code !== u.mop_code) meta.push('Старший: ' + u.mop_name);
  if (u.stazh_label) meta.push('стаж ' + u.stazh_label);
  const showBack = new URLSearchParams(location.search).has('agent');
  const nr = d.n_risk || {};
  let streakChip = '';
  if ((nr.good_streak || 0) >= 1) {
    const g = nr.good_streak;
    streakChip = `<span class="streak-badge">🔥 ${g} ${g === 1 ? 'неделя' : g < 5 ? 'недели' : 'недель'} в плане</span>`;
  } else if ((nr.streak || 0) >= 1) {
    const s = Math.min(nr.streak, 4);
    streakChip = `<span class="n-risk-badge">Н${s}</span>`;
  }
  document.getElementById('hero').innerHTML = `
    <div class="top">
      <div class="top-inner">
        <div class="avatar">${esc(initials(u.name))}</div>
        <div class="who">
          <span class="role">${esc(roleLabel)}</span>${streakChip}
          <h1>${esc(u.name || '')}</h1>
          <div class="meta">${esc(meta.join(' · '))}</div>
        </div>
        <div class="top-actions">
          ${showBack ? '<button class="top-btn" onclick="history.back()" title="Назад">←</button>' : ''}
          <button class="top-btn" onclick="__logout()" title="Выход">⎋</button>
        </div>
      </div>
    </div>`;
}

function renderTab(name, d) {
  if (name === 'main') { if (!document.querySelector('#screen-main .card')) renderMain(d); return; }
  if (name === 'prognoz') { renderPrognozTab(d); return; }
  if (name === 'coach') { renderCoachTab(d); return; }
  if (name === 'clients') { renderClientsTab(d); return; }
  if (name === 'tasks') { renderTasksTab(d); return; }
}

// ============ ГЛАВНАЯ ============

function renderMain(d) {
  const html = [
    irCard(d),
    moneyCard(d),
    goalCard(d),
    funnelCard(d),
    svetoforCard(d),
    tasksPreviewCard(d),
  ].filter(Boolean).join('');
  document.getElementById('screen-main').innerHTML = html || '<div class="empty-tab">Данных нет</div>';
}

function irCard(d) {
  const ir = d.ir_v2 && d.ir_v2.week;
  if (!ir) return '';
  const tot = ir.ir_total ?? 0;
  const cls = tot >= 70 ? 'ok' : (tot >= 50 ? 'warn' : 'bad');
  const b = ir.breakdown || {};
  const c = (key, label) => {
    const v = (b[key] && (b[key].total ?? b[key])) ?? 0;
    const pct = Math.min(100, Math.max(0, v));
    return `<div class="comp-row">
      <div class="cn">${esc(label)}</div>
      <div class="stripe"><i style="width:${pct}%"></i></div>
      <div class="cv">${v}%</div>
    </div>`;
  };
  return `<div class="card">
    <div class="card-h">
      <span class="eyebrow">Индекс развития · неделя</span>
      <span class="pill ${cls}">${cls === 'ok' ? 'норма' : cls === 'warn' ? 'внимание' : 'риск'}</span>
    </div>
    <div class="big">${tot}%</div>
    <div class="muted" style="margin-top:4px">4 равные части: поток · горячие · задатки · вал</div>
    ${c('c1','поток')}${c('c2','горячие')}${c('c3','задатки')}${c('c4','вал')}
  </div>`;
}

function moneyCard(d) {
  const fc = d.forecast;
  if (!fc || !fc.current_month) return '';
  const cm = fc.current_month;
  const nm = fc.next_month || {};
  const factRev = cm.fact_revenue || 0;
  const fcstRev = cm.forecast_revenue || 0;
  const totalRev = cm.revenue_total || (factRev + fcstRev);
  const factInc = cm.fact_income || 0;
  return `<div class="card">
    <div class="eyebrow">${esc((cm.label||'этот месяц').toUpperCase())} · вал и доход</div>
    <div class="money-grid">
      <div class="money-cell">
        <div class="lbl">Вал · оборот</div>
        <div class="val num">${fmtK(factRev)} ₽</div>
        ${fcstRev > 0 ? `<div class="sub">+ прогноз ${fmtK(fcstRev)} → итого ${fmtK(totalRev)}</div>` : '<div class="sub">факт закрытых сделок</div>'}
      </div>
      <div class="money-cell gold">
        <div class="lbl">Доход · моя ЗП</div>
        <div class="val num">${fmtK(factInc)} ₽</div>
        <div class="sub">≈ 48% от вала</div>
      </div>
    </div>
    ${nm.revenue > 0 ? `<div class="money-grid" style="margin-top:8px">
      <div class="money-cell">
        <div class="lbl">${esc((nm.label||'след').toUpperCase())} · прогноз вала</div>
        <div class="val num">${fmtK(nm.revenue)} ₽</div>
        ${nm.target_revenue > 0 ? `<div class="sub">план ${fmtK(nm.target_revenue)} · ${nm.progress_pct}%</div>` : ''}
      </div>
      <div class="money-cell gold">
        <div class="lbl">Прогноз дохода</div>
        <div class="val num">${fmtK(nm.income)} ₽</div>
        <div class="sub">≈ 48% от прогнозного вала</div>
      </div>
    </div>` : ''}
  </div>`;
}

function goalCard(d) {
  const g = d.goal;
  const u = d.user || {};
  if (!g) return '';
  const inc = u.income_month || 0;
  const tgt = g.target_revenue_month || 0;
  const pct = tgt > 0 ? Math.min(100, Math.round(inc/tgt*100)) : 0;
  return `<div class="card">
    <div class="eyebrow">Цель по доходу</div>
    <div class="row" style="justify-content:space-between;margin-top:8px">
      <div class="big" style="color:var(--gold)">${fmtK(inc)} <span class="muted num" style="font-size:14px;font-weight:600">/ ${fmtK(tgt)} ₽</span></div>
      <span class="pill ${pct >= 90 ? 'ok' : pct >= 60 ? 'warn' : 'bad'}">${pct}%</span>
    </div>
    <div class="stack"><div class="fact" style="width:${pct}%">${pct >= 30 ? fmtK(inc) : ''}</div></div>
    <div class="muted" style="margin-top:8px">Средний доход за 12 мес vs цель${g.is_auto ? ' · авто (доход + 50к)' : ''}</div>

function svetoforCard(d) {
  const u = d.user || {};
  const pos = u.position_in_pool ?? u.position_in_company;
  if (pos == null) return '';
  const zone = u.svetofor_zone_label || '';
  const category = u.svetofor_zone_category || '';

    <div class="eyebrow">Светофор</div>
    <div class="row" style="justify-content:space-between;align-items:center;margin-top:8px">
      <div class="big">#${pos}</div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700">${esc(zone)}</div>
        <div class="muted">${esc(category)}</div>
      </div>
    </div>
  </div>`;
}

function funnelCard(d) {
  const f = d.funnels;
  if (!f || (!f.buyer && !f.seller)) return '';
  return `<div class="card">
    <div class="eyebrow">Воронка · ${esc((d.funnels.period_label || 'месяц').toLowerCase())}</div>
    ${sideFunnel('buyer', f.buyer, 'Покупатель')}
    ${sideFunnel('seller', f.seller, 'Продавец')}
  </div>`;
}

function sideFunnel(side, fs, title) {
  if (!fs) return '';
  const stages = fs.stages || [];
  const irCls = fs.ir_status === 'green' ? 'ok' : fs.ir_status === 'yellow' ? 'warn' : 'bad';
  const stagesHtml = stages.map(st => {
    const fact = st.fact || 0;
    const plan = st.plan || 0;
    const forecast = st.forecast || 0;
    const factPct = plan > 0 ? Math.min(100, Math.round(fact/plan*100)) : (fact > 0 ? 100 : 0);
    const forecastDeltaPct = plan > 0 && forecast > fact ? Math.min(100 - factPct, Math.round((forecast-fact)/plan*100)) : 0;
    const showForecast = st.is_revenue && forecast > fact;
    const factLabel = esc(st.fact_label || String(fact));
    const planLabel = esc(st.plan_label || String(plan));
    return `<div class="funnel-stage">
      <div class="st-name">${esc(st.label || '')}${st.hint_label ? ` <span class="muted" style="font-weight:400">${esc(st.hint_label)}</span>` : ''}</div>
      <div class="st-fp"><span class="fact">${factLabel}</span> <span class="plan">/ ${planLabel}</span>${showForecast ? `<div style="font-size:10px;color:var(--warn);font-weight:700">+${fmtK(forecast-fact)}</div>` : ''}</div>
      <div class="st-bar">
        ${factPct > 0 ? `<i class="st-fill-fact" style="width:${factPct}%"></i>` : ''}
        ${forecastDeltaPct > 0 ? `<i class="st-fill-forecast" style="left:${factPct}%;width:${forecastDeltaPct}%"></i>` : ''}
      </div>
    </div>`;
  }).join('');
  return `<div class="funnel-side">
    <div class="funnel-head">
      <span class="funnel-dot ${side}"></span>
      <div class="funnel-title">${side === 'buyer' ? '🛒' : '🏠'} ${esc(title)}</div>
      <span class="pill ${irCls}" style="margin-left:auto">ИР ${fs.ir || 0}%</span>
    </div>
    ${stagesHtml}
  </div>`;
}

function tasksPreviewCard(d) {
  const g = d.tasks && d.tasks.groups;
  if (!g) return '';
  const exp = g.expired || [];
  const today = g.today || [];
  const week = g.week || [];
  if (!exp.length && !today.length && !week.length) return '';
  const grp = (arr, title, cls) => arr.length ? `<div style="font-size:11px;font-weight:800;text-transform:uppercase;color:${cls==='red'?'var(--bad)':'var(--warn)'};margin-top:${arr === exp ? '0' : '10'}px;padding:0 12px 6px">${title} · ${arr.length}</div>${arr.slice(0, 3).map(taskRow).join('')}` : '';
  return `<div class="card" style="padding:0">
    <div style="padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:center">
      <span class="eyebrow">📋 Задачи</span>
      <span style="font-size:12px;color:var(--petrol);font-weight:700;cursor:pointer" onclick="__goTab('tasks')">все задачи ↗</span>
    </div>
    ${grp(exp, '⚠ Просрочено', 'red')}${grp(today, 'Сегодня', 'red')}${grp(week, 'На этой неделе', 'amber')}
  </div>`;
}

function taskRow(t) {
  const authorIcon = t.author_kind === 'self' ? '👤' : t.author_kind === 'manager' ? '👔' : '🤖';
  const overdue = t.overdue || false;
  const whenCls = overdue ? 'overdue' : (t.due_date === new Date().toISOString().slice(0,10) ? 'today' : 'week');
  const dotColor = overdue ? 'var(--bad)' : t.author_kind === 'self' ? 'var(--ok)' : t.author_kind === 'manager' ? '#4F46E5' : 'var(--petrol)';
  return `<div class="list-row ${overdue ? 'overdue' : ''}" onclick="__openTask('${esc(t.id)}',event)">
    <span class="lr-dot" style="background:${dotColor}"></span>
    <div class="lr-body">
      <div class="lr-title">${authorIcon} ${esc(t.title || '')}</div>
      <div class="lr-meta">
        <span class="lr-when ${whenCls}">${esc(t.due_label || t.due_date || 'без срока')}</span>
        ${t.author_display ? `<span>· ${esc(t.author_display)}</span>` : ''}
      </div>
    </div>
    <div class="lr-actions">
      ${t.can_complete ? `<button class="lr-done" onclick="__completeTask('${esc(t.id)}',event)" title="Выполнить">✓</button>` : ''}
    </div>
  </div>`;
}

// ============ ФАЗА 2: ВКЛАДКА ПРОГНОЗ ============

function renderPrognozTab(d) {
  const pt = d.prognoz_tab;
  const g = d.goal;
  if (!pt || !pt.monthly || !pt.monthly.length) {
    document.getElementById('screen-prognoz').innerHTML = `<div class="empty-tab"><span class="em">📈</span>Прогноз появится после месячного снапшота.</div>`;
    return;
  }
  const html = [
    prognozCycleCard(pt, d),
    prognozGoalPathCard(pt, d),
    prognozSegmentsCard(pt),
  ].filter(Boolean).join('');
  document.getElementById('screen-prognoz').innerHTML = html;
}

function prognozCycleCard(pt, d) {
  const months = pt.monthly || [];
  const mode = 'dohod';  // По ТЗ v2 — только доход
  const vals = months.map(m => ({
    ym: m.ym,
    fact: m.fact_income || 0,
    fcst: m.forecast_income || 0,
    plan: m.plan_income || 0,
    is_current: m.is_current, is_future: m.is_future, is_past: m.is_past,
  }));
  const max = Math.max(...vals.map(v => Math.max(v.fact, v.fcst, v.plan)), 1);
  const cols = vals.map(v => {
    const planH = Math.round((v.plan||0)/max*100);
    const factH = Math.round((v.fact||0)/max*100);
    const fcstH = v.fcst>0 ? Math.round(v.fcst/max*100) : 0;
    let bars = '', mainLabel = '—';
    if (v.is_past) {
      if (factH>0) bars = `<div class="fact-bar" style="height:${factH}%"><span class="bar-lbl">${fmtK(v.fact)}</span></div>`;
      mainLabel = v.fact > 0 ? fmtK(v.fact) : '—';
    } else if (v.is_current) {
      if (factH>0) bars += `<div class="fact-bar" style="height:${factH}%;border-radius:${fcstH>factH?'0':'6px'} ${fcstH>factH?'0':'6px'} 6px 6px"><span class="bar-lbl" style="font-size:10px">${fmtK(v.fact)}</span></div>`;
      if (fcstH>factH) {
        const delta = fcstH - factH;
        bars += `<div class="fcst-bar" style="bottom:${factH}%;height:${delta}%;border-radius:6px 6px ${factH>0?'0':'6px'} ${factH>0?'0':'6px'}"><span class="bar-lbl">+${fmtK(v.fcst-v.fact)}</span></div>`;
      }
      mainLabel = v.fcst>0 ? fmtK(v.fcst) : v.fact>0 ? fmtK(v.fact) : '—';
    } else if (v.is_future) {
      if (fcstH>0) bars = `<div class="fcst-bar" style="height:${fcstH}%;bottom:0"><span class="bar-lbl">${fmtK(v.fcst)}</span></div>`;
      mainLabel = v.fcst > 0 ? fmtK(v.fcst) : '—';
    }
    return `<div class="cycle-col">
      <div class="cur-tag ${v.is_current?'':'hidden'}">${v.is_current ? 'сейчас' : ''}</div>
      <div class="bar-slot">
        <div class="plan-bar" style="height:${planH}%"></div>
        ${bars}
      </div>
      <div class="val-label">${mainLabel} / ${fmtK(v.plan)}</div>
      <div class="mon-label">${monShort(v.ym)}</div>
    </div>`;
  }).join('');
  const factTotal = vals.filter(v => !v.is_future).reduce((s,v) => s+(v.fact||0), 0);
  const planTotal = vals.reduce((s,v) => s+(v.plan||0), 0);
  const fcstNext = (vals.find(v => v.is_future) || {}).fcst || 0;
  return `<div class="card">
    <div class="eyebrow">📊 Цикл 6 месяцев · доход (моя ЗП)</div>
    <div class="muted" style="margin-top:2px">Зелёное — факт закрытых сделок, синее — прогноз, штриховка — план.</div>
    <div class="cycle-bars">${cols}</div>
    <div class="cycle-legend">
      <span><i style="background:repeating-linear-gradient(45deg,var(--line) 0,var(--line) 2px,var(--line-2) 2px,var(--line-2) 4px)"></i>план / цель</span>
      <span><i style="background:linear-gradient(180deg,#22c55e,#16a34a)"></i>факт</span>
      <span><i style="background:linear-gradient(180deg,#3b82f6,#1e63d9)"></i>прогноз</span>
    </div>
    <div style="font-size:12px;margin-top:6px;color:var(--muted)">
      За цикл: <b style="color:var(--ink)">${fmtK(factTotal)}</b> из ${fmtK(planTotal)} ЗП · прогноз след: <b style="color:var(--ink)">${fmtK(fcstNext)}</b>
    </div>
  </div>`;
}

function prognozGoalPathCard(pt, d) {
  const months = pt.monthly || [];
  // Накопительный доход и путь + зверь
  const planAcc = []; const factAcc = []; let pS=0, fS=0;
  let lastCompleted = -1;
  months.forEach((m,i) => {
    pS += m.plan_income||0; planAcc.push(pS);
    if (m.is_future) { factAcc.push(null); return; }
    fS += m.fact_income||0; factAcc.push(fS);
    if (m.is_past) lastCompleted = i;
  });
  const total = planAcc[planAcc.length-1] || 1;
  // Зверь по завершённым месяцам
  let ratio = 0, idx = 0, factVal = 0;
  if (lastCompleted >= 0) {
    idx = lastCompleted;
    factVal = factAcc[idx] || 0;
    const planVal = planAcc[idx] || 1;
    ratio = planVal > 0 ? factVal/planVal : 0;
  } else {
    const today = new Date();
    const dim = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
    const day = today.getDate();
    const curIdx = months.findIndex(m => m.is_current);
    idx = curIdx >= 0 ? curIdx : 0;
    factVal = factAcc[idx] || 0;
    const curPlan = (months[idx] && months[idx].plan_income || 0) * day / dim;
    ratio = curPlan > 0 ? factVal/curPlan : 0;
  }
  let animal, col, label;
  if (ratio >= 1.05) { animal = 'cheetah'; col = 'var(--ok)'; label = '🐆 гепард — опережаешь!'; }
  else if (ratio >= 0.85) { animal = 'hare'; col = 'var(--warn)'; label = '🐇 заяц — идёшь ровно'; }
  else { animal = 'turtle'; col = 'var(--bad)'; label = '🐢 черепаха — поднажми'; }

  const W=920, H=280, pl=44, pr=20, pt2=34, pb=38, cw=W-pl-pr, ch=H-pt2-pb, n=months.length;
  const x = i => pl + cw * i / (n-1);
  const y = v => pt2 + ch * (1 - (v||0)/total);
  let s = '';
  for (let g=0; g<=4; g++){
    const gy = pt2 + ch*g/4;
    s += `<line x1="${pl}" y1="${gy}" x2="${W-pr}" y2="${gy}" stroke="#eef0f4"/>`;
    s += `<text x="${pl-7}" y="${gy+3}" text-anchor="end" font-size="9" fill="#b4b9c5">${100-g*25}%</text>`;
  }
  months.forEach((m,i) => {
    s += `<text x="${x(i)}" y="${H-12}" text-anchor="middle" font-size="11" fill="#7a8194">${monShort(m.ym)}</text>`;
  });
  s += `<polyline points="${planAcc.map((v,i)=>`${x(i)},${y(v)}`).join(' ')}" fill="none" stroke="var(--line)" stroke-width="2.5" stroke-dasharray="6 5"/>`;
  const fpts = factAcc.map((v,i) => v == null ? null : (months[i] && (months[i].is_past || months[i].is_current) ? [x(i), y(v)] : null)).filter(Boolean);
  if (fpts.length > 1) {
    const area = `${fpts[0][0]},${y(0)} ${fpts.map(p=>p.join(',')).join(' ')} ${fpts[fpts.length-1][0]},${y(0)}`;
    s += `<polygon points="${area}" fill="#16a34a" opacity="0.10"/>`;
    s += `<polyline points="${fpts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round"/>`;
  }
  fpts.forEach(p => { s += `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="#fff" stroke="#16a34a" stroke-width="3"/>`; });
  // Прогнозная линия (синяя) от последней past через current и future
  const fpts_forecast = [];
  let baseAcc = 0, baseIdx = -1;
  months.forEach((m,i) => { if (m.is_past) { baseAcc += m.fact_income||0; baseIdx = i; }});
  if (baseIdx >= 0) fpts_forecast.push([x(baseIdx), y(baseAcc)]); else fpts_forecast.push([x(0), y(0)]);
  let accF = baseAcc;
  const curIdxLocal = months.findIndex(m => m.is_current);
  if (curIdxLocal >= 0) {
    const curFc = Math.max(months[curIdxLocal].forecast_income||0, months[curIdxLocal].fact_income||0);
    accF += curFc;
    fpts_forecast.push([x(curIdxLocal), y(accF)]);
  }
  const nextFutureIdx = months.findIndex(m => m.is_future);
  if (nextFutureIdx >= 0 && (months[nextFutureIdx].forecast_income||0) > 0) {
    accF += months[nextFutureIdx].forecast_income||0;
    fpts_forecast.push([x(nextFutureIdx), y(accF)]);
  }
  if (fpts_forecast.length > 1) {
    s += `<polyline points="${fpts_forecast.map(p=>p.join(',')).join(' ')}" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" opacity="0.85"/>`;
    for (let i = 1; i < fpts_forecast.length; i++) {
      const p = fpts_forecast[i];
      s += `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="#fff" stroke="#3b82f6" stroke-width="3"/>`;
    }
  }
  // Прогнозная позиция в светофоре
  const posBadge = (px, py, txt) => `<g transform="translate(${px},${py-12})">
    <rect x="-32" y="-14" width="64" height="18" rx="9" fill="#3b82f6"/>
    <text x="0" y="-1" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">${txt}</text>
  </g>`;
  if (curIdxLocal >= 0 && fpts_forecast.length >= 2) {
    const pp = months[curIdxLocal] && months[curIdxLocal].predicted_position;
    if (pp && pp.pos) s += posBadge(fpts_forecast[1][0], fpts_forecast[1][1], `#${pp.pos}`);
  }
  if (nextFutureIdx >= 0 && fpts_forecast.length >= 3) {
    const pp = months[nextFutureIdx] && months[nextFutureIdx].predicted_position;
    if (pp && pp.pos) s += posBadge(fpts_forecast[2][0], fpts_forecast[2][1], `#${pp.pos}`);
  }
  // Зверь
  if (fpts.length > 0) {
    const last = [x(idx), y(factVal)];
    let beast = '';
    if (animal === 'cheetah') {
      beast = `<ellipse cx="0" cy="-12" rx="17" ry="9" fill="${col}"/><circle cx="15" cy="-18" r="7" fill="${col}"/><circle cx="17" cy="-19" r="1.6" fill="#fff"/>`;
    } else if (animal === 'hare') {
      beast = `<ellipse cx="0" cy="-10" rx="11" ry="13" fill="${col}"/><circle cx="0" cy="-24" r="8" fill="${col}"/><ellipse cx="-4" cy="-36" rx="3.5" ry="10" fill="${col}"/><ellipse cx="4" cy="-36" rx="3.5" ry="10" fill="${col}"/>`;
    } else {
      beast = `<ellipse cx="0" cy="-10" rx="14" ry="10" fill="${col}"/><circle cx="15" cy="-13" r="6" fill="${col}"/>`;
    }
    s += `<g transform="translate(${last[0]},${last[1]-6})">
      <g transform="translate(0,-30)">${beast}</g>
      <text x="0" y="-50" text-anchor="middle" font-size="11" font-weight="800" fill="${col}">это я!</text>
      <text x="0" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="${col}">${label}</text>
    </g>`;
  }
  // Прогноз позиции подпись
  const curM = months.find(m => m.is_current);
  const nxtM = months.find(m => m.is_future);
  const curPP = curM && curM.predicted_position;
  const nxtPP = nxtM && nxtM.predicted_position;
  let posLine = '';
  if (curPP || nxtPP) {
    const parts = [];
    if (curPP) parts.push(`<b>${monShort(curM.ym)}</b>: место <b style="color:#3b82f6">#${curPP.pos}</b> <span style="color:var(--muted)">(${esc(curPP.category||'')})</span>`);
    if (nxtPP) parts.push(`<b>${monShort(nxtM.ym)}</b>: место <b style="color:#3b82f6">#${nxtPP.pos}</b> <span style="color:var(--muted)">(${esc(nxtPP.category||'')})</span>`);
    posLine = `<div style="margin-top:10px;font-size:12px;color:var(--ink);background:var(--petrol-soft);border:1px solid var(--line);border-radius:8px;padding:9px 12px">📍 <b>По прогнозу дохода твоя позиция в светофоре</b>: ${parts.join(' · ')}</div>`;
  }
  return `<div class="card">
    <div class="eyebrow">🎯 Как я иду к цели по доходу</div>
    <div class="muted" style="margin-top:2px">Накопительный доход за цикл vs плановый темп.</div>
    <div style="display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:8px;flex-wrap:wrap">
      <span><i style="display:inline-block;width:11px;height:3px;background:#16a34a;vertical-align:middle;margin-right:5px"></i>факт</span>
      <span><i style="display:inline-block;width:11px;height:3px;background:#3b82f6;vertical-align:middle;margin-right:5px"></i>прогноз (тек. мес + след.)</span>
      <span><i style="display:inline-block;width:11px;height:3px;background:var(--line);vertical-align:middle;margin-right:5px"></i>план цикла</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;margin-top:8px">${s}</svg>
    ${posLine}
  </div>`;
}

function prognozSegmentsCard(pt) {
  if (!pt.segments || !pt.segments.length) return '';
  const tot = pt.totals || {};
  const rows = pt.segments.map(s => {
    const headParts = [];
    if (s.b_deals > 0) headParts.push(`<span class="muted">🛒 покуп: <b style="color:var(--ink)">${s.b_deals}</b> · ${fmtK(s.b_revenue)} ₽</span>`);
    if (s.s_deals > 0) headParts.push(`<span class="muted">🏠 прод: <b style="color:var(--ink)">${s.s_deals}</b> · ${fmtK(s.s_revenue)} ₽</span>`);
    return `<div style="border:1px solid var(--line);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-top:8px">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700">${esc(s.label)}</div>
        <div style="font-size:11px;margin-top:3px;display:flex;gap:11px;flex-wrap:wrap">${headParts.join('')}</div>
      </div>
      <div style="text-align:right;white-space:nowrap">
        <div style="font-size:15px;font-weight:800;color:var(--ok)">${fmtK(s.total_revenue)} ₽</div>
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase">${s.total_deals} сделок</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="card">
    <div class="eyebrow">💰 Сделки за цикл по сегментам</div>
    <div class="muted" style="margin-top:2px">Что закрыто за 6 мес. Доход ≈ 48% от вала.</div>
    ${rows}
    <div style="margin-top:12px;padding:11px 13px;background:var(--ok-soft);border:1px solid var(--ok-line);border-radius:10px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:11px;color:var(--ok);font-weight:800;text-transform:uppercase">ИТОГО ЗА ЦИКЛ</div><div style="font-size:13px;color:var(--muted)">${tot.deals || 0} сделок</div></div>
      <div style="text-align:right"><div style="font-size:19px;font-weight:800;color:var(--ok)">${fmtK(tot.revenue||0)} ₽</div><div style="font-size:12px;color:var(--muted)">≈ ${fmtK(tot.income||0)} ЗП</div></div>
    </div>
  </div>`;
}

// ============ ФАЗА 3: ТРЕНЕР ============

function renderCoachTab(d) {
  const coach = d.coach;
  if (!coach || (!coach.buyer && !coach.seller)) {
    document.getElementById('screen-coach').innerHTML = `<div class="empty-tab"><span class="em">🎓</span>Диагностика появится после ночного расчёта.</div>`;
    return;
  }
  const html = [
    coachSide('buyer', coach.buyer, 'Покупатель', '🛒'),
    coachSide('seller', coach.seller, 'Продавец', '🏠'),
    aiCoachCard(d),
  ].filter(Boolean).join('');
  document.getElementById('screen-coach').innerHTML = html || '<div class="empty-tab">Данных нет</div>';
}

function coachSide(side, c, title, emoji) {
  if (!c) return '';
  const rec = c.recommendation_for_realtor || c.variant_data?.recommendation_for_realtor || '';
  const weak = (c.weak_points || []).map(w => `<div class="weak-item">
    <span class="wl">⚠ ${esc(w.bit_label || w.bit_key || '')}</span>
    <span class="wr">${esc(w.actual || '')} / порог ${esc(w.threshold || '')}</span>
  </div>`).join('');
  return `<div class="card">
    <div class="card-h">
      <span class="eyebrow">${emoji} ${esc(title)}</span>
    </div>
    ${rec ? `<div style="font-size:13px;margin-top:6px;padding:10px 12px;background:var(--petrol-soft);border-radius:8px;line-height:1.5">💡 ${esc(rec)}</div>` : ''}
    ${weak ? `<div style="margin-top:10px">${weak}</div>` : '<div class="muted" style="margin-top:8px">Слабых мест не найдено.</div>'}
  </div>`;
}

function aiCoachCard(d) {
  const ai = d.ai_coach;
  if (!ai || (!ai.coach_text && !ai.motivator_text)) return '';
  return `<div class="card" style="background:linear-gradient(150deg,var(--petrol-soft),#F1F6F7);border-color:var(--petrol-soft)">
    <div class="eyebrow" style="color:var(--petrol)">✨ ИИ-тренер</div>
    ${ai.motivator_text ? `<div style="font-size:13px;line-height:1.55;margin-top:6px">${esc(ai.motivator_text)}</div>` : ''}
    ${ai.coach_text ? `<div style="font-size:13px;line-height:1.55;margin-top:10px;color:var(--ink-2)">${esc(ai.coach_text)}</div>` : ''}
    ${ai.generated_at ? `<div class="muted" style="margin-top:8px;font-size:10.5px">Сгенерировано ${new Date(ai.generated_at).toLocaleDateString('ru-RU')} · ${esc(ai.model || 'YandexGPT')}</div>` : ''}
  </div>`;
}

// ============ ФАЗА 4: КЛИЕНТЫ (заглушка Coming Soon 01.09) ============

function renderClientsTab(d) {
  document.getElementById('screen-clients').innerHTML = `
    <div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:44px;margin-bottom:16px">✨</div>
      <div style="font-size:11px;font-weight:800;color:var(--gold);background:var(--gold-soft);display:inline-block;padding:6px 12px;border-radius:999px;margin-bottom:14px">Coming Soon · 01.09.2026</div>
      <div style="font-size:18px;font-weight:800;margin-bottom:10px">👥 База клиентов</div>
      <div class="muted" style="max-width:400px;margin:0 auto">Полный список клиентов с историей, статусами и подсказками ИИ. Подтянем из CRM «Этажей».</div>
    </div>`;
}

// ============ ФАЗА 5: ЗАДАЧИ ============

function renderTasksTab(d) {
  const tasks = d.tasks || {};
  const groups = tasks.groups || {};
  const all = [
    ...(groups.expired || []).map(t => ({...t, _bucket: 'expired'})),
    ...(groups.today || []).map(t => ({...t, _bucket: 'today'})),
    ...(groups.week || []).map(t => ({...t, _bucket: 'week'})),
    ...(groups.later || []).map(t => ({...t, _bucket: 'later'})),
  ];
  const done = (groups.done_recent || []).map(t => ({...t, _bucket: 'done'}));

  const filter = CTX.taskFilter || 'all';
  let filtered;
  if (filter === 'overdue') filtered = all.filter(t => t._bucket === 'expired');
  else if (filter === 'today') filtered = all.filter(t => t._bucket === 'today');
  else if (filter === 'week') filtered = all.filter(t => t._bucket === 'week');
  else if (filter === 'later') filtered = all.filter(t => t._bucket === 'later');
  else if (filter === 'done') filtered = done;
  else filtered = all;

  const cnts = {
    all: all.length,
    overdue: (groups.expired || []).length,
    today: (groups.today || []).length,
    week: (groups.week || []).length,
    later: (groups.later || []).length,
    done: done.length,
  };

  const filterBtn = (val, label, count) => `<button class="lf-btn ${filter===val?'on':''}" onclick="__setTaskFilter('${val}')">${label}${count!=null?` <span style="opacity:.7">${count}</span>`:''}</button>`;

  const rows = filtered.length
    ? filtered.map(taskRow).join('')
    : `<div class="empty-tab" style="padding:40px">🎉 Нет задач по этому фильтру.</div>`;

  document.getElementById('screen-tasks').innerHTML = `
    <div class="card" style="padding:12px">
      <div class="task-filters">
        ${filterBtn('all','Все',cnts.all)}
        ${cnts.overdue ? filterBtn('overdue','⚠ Просрочено',cnts.overdue) : ''}
        ${filterBtn('today','Сегодня',cnts.today)}
        ${filterBtn('week','Неделя',cnts.week)}
        ${cnts.later ? filterBtn('later','Позже',cnts.later) : ''}
        ${filterBtn('done','Выполнено',cnts.done)}
      </div>
      <div>${rows}</div>
    </div>`;
}

window.__setTaskFilter = (f) => {
  CTX.taskFilter = f;
  renderTasksTab(CTX.data);
};

window.__goTab = (name) => {
  const t = document.querySelector(`.tab[data-tab="${name}"]`);
  if (t) t.click();
};

window.__openTask = async (taskId, ev) => {
  if (ev) ev.stopPropagation();
  try {
    const db = getDatabase(getApp());
    await openTaskDetail({ db, ownerCode: CTX.target, taskId });
  } catch (e) { console.error(e); alert('Не удалось открыть задачу: ' + (e.message || e)); }
};

window.__completeTask = async (taskId, ev) => {
  if (ev) ev.stopPropagation();
  const btn = ev && ev.target && ev.target.closest && ev.target.closest('button');
  const row = ev && ev.target && ev.target.closest && ev.target.closest('.list-row');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const fns = getFunctions(getApp(), 'europe-west1');
    await httpsCallable(fns, 'updateTaskStatus')({ task_id: taskId, status: 'done' });
    try { ym(110734803, 'reachGoal', 'task_done'); } catch(_){}
    if (row) { row.style.transition = 'opacity .2s'; row.style.opacity = '0'; setTimeout(() => row.remove(), 250); }
  } catch (e) {
    alert('Не удалось: ' + (e.message || e));
    if (btn) { btn.disabled = false; btn.textContent = '✓'; }
  }
};

window.__logout = async () => { await logout(); };
</script>
