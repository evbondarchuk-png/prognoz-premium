  <style>
    /* === Страница входа === */
    body {
      background: linear-gradient(160deg, var(--petrol-soft) 0%, var(--paper) 50%, var(--gold-soft) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-5);
    }

    .login-card {
      background: var(--card);
      padding: var(--sp-8) var(--sp-7);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--line);
    }

    .logo {
      text-align: center;
      font-size: var(--fs-2xl);
      font-weight: var(--fw-eb);
      color: var(--petrol);
      margin-bottom: var(--sp-1);
      letter-spacing: -0.5px;
    }
    .logo-icon {
      display: block;
      text-align: center;
      font-size: 40px;
      margin-bottom: var(--sp-2);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: var(--fs-base);
      margin-bottom: var(--sp-7);
    }

    .step { display: none; }
    .step.active { display: block; }

    label {
      display: block;
      font-size: var(--fs-sm);
      font-weight: var(--fw-sb);
      color: var(--ink-2);
      margin-bottom: var(--sp-1);
    }

    input {
      width: 100%;
      padding: var(--sp-3) var(--sp-3);
      font-size: var(--fs-md);
      font-family: inherit;
      border: 1.5px solid var(--line);
      border-radius: var(--r-sm);
      outline: none;
      background: var(--card);
      color: var(--ink);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input:focus {
      border-color: var(--petrol);
      box-shadow: 0 0 0 3px var(--petrol-soft);
    }
    input::placeholder { color: var(--muted) }

    .otp-input {
      letter-spacing: 10px;
      text-align: center;
      font-size: var(--fs-xl);
      font-weight: var(--fw-b);
      padding: var(--sp-4) var(--sp-3);
    }

    .btn-submit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      width: 100%;
      padding: var(--sp-3) var(--sp-4);
      margin-top: var(--sp-5);
      font-size: var(--fs-md);
      font-weight: var(--fw-sb);
      font-family: inherit;
      color: #fff;
      background: var(--petrol);
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition);
    }
    .btn-submit:hover:not(:disabled) {
      background: var(--petrol-deep);
      box-shadow: 0 4px 12px rgba(12,84,96,.25);
    }
    .btn-submit:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    .link {
      display: block;
      text-align: center;
      margin-top: var(--sp-4);
      color: var(--petrol);
      text-decoration: none;
      font-size: var(--fs-base);
      font-weight: var(--fw-m);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color var(--transition);
    }
    .link:hover { color: var(--petrol-deep); text-decoration: underline; }

    .info-box {
      background: var(--petrol-soft);
      color: var(--petrol);
      padding: var(--sp-3);
      border-radius: var(--r-sm);
      font-size: var(--fs-base);
      margin-bottom: var(--sp-4);
      border: 1px solid rgba(12,84,96,.1);
    }
    .info-box b {
      font-family: 'Courier New', monospace;
      font-weight: var(--fw-b);
    }

    .error-box {
      background: var(--bad-soft);
      color: var(--bad);
      padding: var(--sp-3);
      border-radius: var(--r-sm);
      font-size: var(--fs-base);
      margin-bottom: var(--sp-4);
      border: 1px solid var(--bad-line);
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: var(--sp-2);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      margin-top: var(--sp-6);
      color: var(--muted);
      font-size: var(--fs-xs);
    }
  </style>

<body>
  <div class="login-card">
    <div class="logo-icon">🦊</div>
    <div class="logo">Премиум</div>
    <div class="subtitle">Система управления продажами</div>

    <div id="error" class="error-box"></div>

    <!-- ШАГ 1: код сотрудника -->
    <div id="step-code" class="step active">
      <label for="code">Код сотрудника</label>
      <input type="text" id="code" inputmode="numeric" autocomplete="off"
             placeholder="Например, 27890" />
      <button class="btn-submit" id="btn-request" onclick="requestOtp()">Получить код</button>
    </div>

    <!-- ШАГ 2: ввод OTP -->
    <div id="step-otp" class="step">
      <div class="info-box">
        Код отправлен на <b id="email-mask">***</b>
      </div>
      <label for="otp">Код из письма (6 цифр)</label>
      <input type="text" id="otp" inputmode="numeric" autocomplete="one-time-code"
             maxlength="6" class="otp-input" placeholder="••••••" />
      <button class="btn-submit" id="btn-verify" onclick="verifyOtp()">Войти</button>
      <button class="link" onclick="resetToStep1()">← Указать другой код</button>
    </div>

    <div class="footer">Этажи · Прогноз Премиум v2</div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithCustomToken, setPersistence, browserLocalPersistence }
      from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
    import { getFunctions, httpsCallable }
      from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-functions.js';

    const firebaseConfig = {
      databaseURL: 'https://prognoz-archive-default-rtdb.europe-west1.firebasedatabase.app',
      apiKey: 'AIzaSyCOSLUKCQMhV4HL5Rgle38e3NHeZis6wyU',
      authDomain: 'prognoz-archive.firebaseapp.com',
      projectId: 'prognoz-archive',
      appId: '1:47892435250:web:2efc1123c3191ce556472b',
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const functions = getFunctions(app, 'europe-west1');

    await setPersistence(auth, browserLocalPersistence);

    const requestOtpFn = httpsCallable(functions, 'requestOtp');
    const verifyOtpFn = httpsCallable(functions, 'verifyOtp');

    const $ = (id) => document.getElementById(id);
    const showError = (msg) => { $('error').textContent = msg; $('error').style.display = 'block'; };
    const hideError = () => { $('error').style.display = 'none'; };
    const setLoading = (btnId, loading, text) => {
      const btn = $(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? `<span class="spinner"></span>${text}` : text;
    };

    window.requestOtp = async () => {
      hideError();
      const code = $('code').value.trim();
      if (!/^\d+$/.test(code)) {
        showError('Введите числовой код сотрудника.');
        return;
      }
      setLoading('btn-request', true, 'Отправляем...');
      try {
        const res = await requestOtpFn({ code });
        $('email-mask').textContent = res.data.emailMask;
        $('step-code').classList.remove('active');
        $('step-otp').classList.add('active');
        $('otp').focus();
      } catch (e) {
        showError(e.message || 'Ошибка отправки кода.');
      } finally {
        setLoading('btn-request', false, 'Получить код');
      }
    };

    window.verifyOtp = async () => {
      hideError();
      const code = $('code').value.trim();
      const otp = $('otp').value.trim();
      if (!/^\d{6}$/.test(otp)) {
        showError('Введите 6 цифр из письма.');
        return;
      }
      setLoading('btn-verify', true, 'Проверяем...');
      try {
        const res = await verifyOtpFn({ code, otp });
        await signInWithCustomToken(auth, res.data.token);
        const params = new URLSearchParams(location.search);
        const back = params.get('back');
        const role = res.data.role;
        const dest = back ? decodeURIComponent(back)
                   : role === 'realtor' ? 'index.html'
                   : role === 'mop'     ? 'senior.html'
                   : role === 'rop'     ? 'senior.html'
                   : role === 'aup'     ? 'senior.html'
                   : role === 'admin'   ? 'senior.html'
                   : 'index.html';
        // Yandex.Metrika — цель «Логин» + параметры пользователя
        try { ym(110734803, 'reachGoal', 'login'); } catch(_){}
        try { ym(110734803, 'userParams', { role: role, code: code }); } catch(_){}
        location.href = dest;
      } catch (e) {
        showError(e.message || 'Ошибка проверки кода.');
      } finally {
        setLoading('btn-verify', false, 'Войти');
      }
    };

    window.resetToStep1 = () => {
      hideError();
      $('otp').value = '';
      $('step-otp').classList.remove('active');
      $('step-code').classList.add('active');
      $('code').focus();
    };

    $('code').addEventListener('keydown', (e) => { if (e.key === 'Enter') window.requestOtp(); });
    $('otp').addEventListener('keydown', (e) => { if (e.key === 'Enter') window.verifyOtp(); });
  </script>
</body>
</html>
